<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Databse By Feng</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: #09070f;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }
        .panel {
            width: 100%;
            max-width: 420px;
            background: rgba(15, 12, 27, 0.9);
            border: 2px solid #1f1938;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 0 30px rgba(52, 152, 219, 0.2);
            text-align: center;
            z-index: 10;
        }
        .banner-box {
            width: 100%;
            height: 140px;
            background: #130f24;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px dashed #3498db;
            overflow: hidden;
        }
        .banner-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(54, 162, 235, 0.6);
            margin-bottom: 5px;
        }
        .subtitle {
            font-size: 11px;
            color: #3498db;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 11px;
            color: #8a81b5;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
            font-weight: 600;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #130f24;
            border: 1px solid #292248;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }
        input:focus {
            border-color: #3498db;
            box-shadow: 0 0 10px rgba(52, 152, 219, 0.3);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #7209b7, #3498db);
            border: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(114, 9, 183, 0.4);
            margin-top: 10px;
        }
        .btn-danger {
            background: linear-gradient(90deg, #d00000, #e85d04);
            box-shadow: 0 4px 15px rgba(208, 0, 0, 0.4);
            margin-top: 12px;
        }
        .btn:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
        }
        .social-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
            width: 100%;
        }
        .btn-social {
            flex: 1;
            padding: 10px 0;
            border-radius: 8px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            color: #ffffff;
            transition: 0.3s;
            text-transform: uppercase;
            text-align: center;
        }
        .btn-wa { background: #25d366; }
        .btn-tele { background: #0088cc; }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .main-dashboard {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            overflow-y: auto;
            padding: 20px 0;
        }
        .bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }
        .dashboard-content {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: rgba(10, 8, 20, 0.85);
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(10px);
            margin: auto;
        }
        .watermark {
            font-size: 10px;
            color: #5c527f;
            letter-spacing: 2px;
            margin-top: 25px;
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
        }
        .separator {
            margin: 20px 0;
            border: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(52, 152, 219, 0.5), transparent);
        }
    </style>
</head>
<body>

<div class="panel" id="loginPanel">
    <div class="banner-box">
        <img src="https://d.top4top.io/p_38267qcid1.jpg">
    </div>
    <h1>Database By Feng</h1>
    <div class="subtitle">Sasuke Database</div>
    
    <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" autocomplete="off">
    </div>
    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password">
    </div>
    
    <button class="btn" onclick="prosesLogin()">Login To</button>

    <div class="social-btns">
        <a href="https://wa.me/6285242556628" target="_blank" class="btn-social btn-wa">WhatsApp</a>
        <a href="https://t.me/IkyyRowr" target="_blank" class="btn-social btn-tele">Telegram</a>
    </div>

    <div class="watermark">DATABASE BY FENG</div>
</div>

<div class="video-container" id="introContainer">
    <video id="introVideo" playsinline>
        <source src="https://j.top4top.io/m_3826xfc4x1.mp4" type="video/mp4">
    </video>
</div>

<div class="main-dashboard" id="dashboardPanel">
    <video class="bg-video" id="mainBgVideo" loop muted playsinline>
        <source src="https://c.top4top.io/m_3826f29gd1.mp4" type="video/mp4">
    </video>
    
    <div class="dashboard-content">
        <h1>Sasuke Database</h1>
        <div class="subtitle" style="margin-bottom: 25px;">Web Tools Panel Controller</div>
        
        <div class="input-group">
            <label>Masukkan Nomor Anda</label>
            <input type="number" id="nomorTarget" placeholder="Contoh: 6281356165300" style="text-align: center; font-size: 16px; letter-spacing: 1px;">
        </div>
        
        <button class="btn" id="btnKirimDb" onclick="prosesDatabase('ADD')">ADD DATABASE</button>
        
        <hr class="separator">
        
        <button class="btn btn-danger" id="btnHapusDb" onclick="prosesDatabase('DEL')">DEL DATABASE</button>
        
        <div class="watermark">DATABASE BY FENG</div>
    </div>
</div>

<script>
    const p1 = "ghp_U6cSqYYGHwo";
    const p2 = "VlDNOnu59Fsq23rMoEZ2lXLWO";
    const tokenSempurna = p1 + p2;

    const CONFIG_GH = {
        token: tokenSempurna,
        username: "vinzraptor35",
        repository: "Database_web"
    };

    function prosesLogin() {
        const u = document.getElementById('username').value;
        const p = document.getElementById('password').value;
        
        if (u === 'Raja FengXiu' && p === 'databse feng') {
            document.getElementById('loginPanel').style.display = 'none';
            const introContainer = document.getElementById('introContainer');
            const introVideo = document.getElementById('introVideo');
            
            introContainer.style.display = 'flex';
            introVideo.play();
            
            introVideo.onended = function() {
                introContainer.style.display = 'none';
                const dbPanel = document.getElementById('dashboardPanel');
                dbPanel.style.display = 'flex';
                document.getElementById('mainBgVideo').play();
            };
        } else {
            alert('Username atau Password salah, King!');
        }
    }

    function prosesDatabase(aksi) {
        const nomor = document.getElementById('nomorTarget').value.trim();
        const btnAdd = document.getElementById('btnKirimDb');
        const btnDel = document.getElementById('btnHapusDb');

        if (!nomor) { alert('Masukkan nomor WhatsApp terlebih dahulu, King!'); return; }

        if (aksi === 'ADD') {
            btnAdd.innerText = "STORING TO GITHUB...";
            btnAdd.disabled = true;
            btnDel.disabled = true;
        } else {
            btnDel.innerText = "DELETING FROM GITHUB...";
            btnAdd.disabled = true;
            btnDel.disabled = true;
        }

        const urlApi = `https://api.github.com/repos/${CONFIG_GH.username}/${CONFIG_GH.repository}/contents/database.json`;

        fetch(urlApi, {
            headers: { 'Authorization': `token ${CONFIG_GH.token}` }
        })
        .then(res => res.json())
        .then(fileData => {
            let currentObj = { nomer: [] };
            let currentSha = fileData.sha || '';
            
            if (fileData.content) {
                try {
                    currentObj = JSON.parse(atob(fileData.content));
                } catch(e) { currentObj = { nomer: [] }; }
            }

            if (!currentObj.nomer || !Array.isArray(currentObj.nomer)) {
                currentObj.nomer = [];
            }

            if (aksi === 'ADD') {
                if (!currentObj.nomer.includes(nomor)) {
                    currentObj.nomer.push(nomor);
                } else {
                    alert('Nomor ini sudah ada di dalam database, King!');
                    resetTombol();
                    return null;
                }
            } else if (aksi === 'DEL') {
                if (currentObj.nomer.includes(nomor)) {
                    currentObj.nomer = currentObj.nomer.filter(n => n !== nomor);
                } else {
                    alert('Nomor tidak ditemukan di database, gagal menghapus!');
                    resetTombol();
                    return null;
                }
            }

            const updatePayload = {
                message: aksi === 'ADD' ? "Add new number via Web Sasuke Panel" : "Delete number via Web Sasuke Panel",
                content: btoa(JSON.stringify(currentObj, null, 2)),
                sha: currentSha
            };

            return fetch(urlApi, {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${CONFIG_GH.token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(updatePayload)
            });
        })
        .then(res => {
            if (res === null) return;
            
            if (res.ok) {
                if (aksi === 'ADD') {
                    alert('🔥 Sukses! Nomor baru berhasil ditambahkan ke database GitHub.');
                } else {
                    alert('🗑️ Sukses! Nomor berhasil dihapus dari database GitHub.');
                }
                document.getElementById('nomorTarget').value = '';
            } else {
                alert('Gagal memproses ke GitHub, cek token lu King.');
            }
            resetTombol();
        })
        .catch(() => {
            alert('Terjadi kendala koneksi ke API GitHub.');
            resetTombol();
        });

        function resetTombol() {
            btnAdd.innerText = "ADD DATABASE";
            btnDel.innerText = "DEL DATABASE";
            btnAdd.disabled = false;
            btnDel.disabled = false;
        }
    }
</script>

</body>
</html>
